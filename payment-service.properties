server.port=8085

spring.datasource.url=jdbc:mysql://localhost:3306/microservice_payment_db
spring.datasource.username=root
spring.datasource.password=Riyajain@2002

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true


# Enable actuator endpoints
management.endpoints.web.exposure.include=*

# Circuit Breaker
resilience4j.circuitbreaker.instances.notificationService.register-health-indicator=true
resilience4j.circuitbreaker.instances.notificationService.sliding-window-size=5
resilience4j.circuitbreaker.instances.notificationService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.notificationService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.notificationService.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.notificationService.minimum-number-of-calls=5
